# HarrisLabPlotting conda environment
# -----------------------------------
# Minimal set of dependencies required to run the package, the CLI
# (`hlplot`), and the tutorial notebooks. Every entry below is actually
# imported somewhere in the codebase (verified against `import` statements).
#
# Create the environment with:
#     conda env create -f environment.yml
#     conda activate harris_lab_plotting
#     pip install -e .   # install HarrisLabPlotting itself in editable mode
#
name: harris_lab_plotting
channels:
  - conda-forge
dependencies:
  # --- Core scientific stack ---
  - python>=3.9
  - numpy>=1.21          # arrays, math (used everywhere)
  - pandas>=1.3          # tabular IO and ROI/metric tables
  - scipy>=1.7           # scipy.io.loadmat, scipy.ndimage.center_of_mass

  # --- Neuroimaging IO ---
  - nibabel>=4.0         # NIfTI / GIFTI mesh + atlas loading

  # --- Graph + plotting ---
  - networkx>=2.6        # graph construction in connectivity.py
  - plotly>=5.0          # interactive 3D HTML plots
  - pillow>=9.0          # PNG stitching for hlplot --multi-view exports

  # --- Tutorials (optional but expected by the .ipynb tutorials) ---
  - jupyterlab           # only needed to run the tutorial notebooks

  # --- pip-only deps ---
  - pip
  - pip:
      - kaleido          # static PNG/SVG/PDF export from plotly
      - click>=8.0       # CLI framework (hlplot entry point)
      - pyyaml>=6.0      # YAML config files for `hlplot batch`
      - rich>=12.0       # Rich console output for the CLI
